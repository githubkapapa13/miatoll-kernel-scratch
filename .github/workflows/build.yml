name: Forge Miatoll Kernel Q

on:
  workflow_dispatch:

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - name: Free Runner Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libssl-dev libcrypto++-dev bison flex libelf-dev lzop libncurses5-dev libncursesw5-dev libglib2.0-dev

      - name: Fetch Raw Xiaomi Source
        run: |
          git clone https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b curtana-q-oss --depth=1 kernel-source

      - name: Fetch Legacy AOSP Toolchains
        run: |
          mkdir tc
          cd tc
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android-11.0.0_r42 --depth=1 clang
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android-10.0.0_r47 --depth=1 gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-10.0.0_r47 --depth=1 gcc32

      - name: CCache / Build Storage Optimization
        uses: actions/cache@v4
        with:
          path: kernel-source/out
          key: miatoll-kernel-out-cache-${{ github.run_id }}
          restore-keys: |
            miatoll-kernel-out-cache-

      - name: Execute Kernel Compilation
        run: |
          cd kernel-source
          
          TOOLCHAIN_DIR=$GITHUB_WORKSPACE/tc
          CLANG_DIR=$TOOLCHAIN_DIR/clang/clang-r383912c
          GCC64_DIR=$TOOLCHAIN_DIR/gcc64
          GCC32_DIR=$TOOLCHAIN_DIR/gcc32
          
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$CLANG_DIR/bin:$GCC64_DIR/bin:$GCC32_DIR/bin:$PATH
          
          # Force Patch the core Makefiles to stop falling back to /usr/bin/as
          find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/$(CROSS_COMPILE)as/clang -fintegrated-as/g' 2>/dev/null || true
          
          # Hard-force the rogue vDSO sub-makefile variables to use our integrated compilers
          if [ -f "arch/arm64/kernel/vdso/Makefile" ]; then
              echo "Patching vDSO sub-makefile tools layout..."
              sed -i 's/CC) (targets/CC) -fintegrated-as (targets/g' arch/arm64/kernel/vdso/Makefile 2>/dev/null || true
              echo "VDSO_LDFLAGS += -fuse-ld=lld" >> arch/arm64/kernel/vdso/Makefile
          fi
          
          MAKE_FLAGS=(
              CROSS_COMPILE=aarch64-linux-android- \
              CROSS_COMPILE_ARM32=arm-linux-androideabi- \
              CC=clang \
              HOSTCC=gcc \
              HOSTCFLAGS="-O2 -g -fcommon" \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              cc-name=clang \
              KCFLAGS="-w -fintegrated-as" \
              O=out
          )
          
          # Initialize baseline parameters if persistent environment storage is empty
          if [ ! -f "out/.config" ]; then
              make vendor/atoll_defconfig "${MAKE_FLAGS[@]}"
              ./scripts/config --file out/.config --disable CC_STACKPROTECTOR_STRONG
              ./scripts/config --file out/.config --enable CC_STACKPROTECTOR_NONE
              make olddefconfig "${MAKE_FLAGS[@]}"
          fi
          
          echo "Executing make build..."
          make -j$(nproc --all) "${MAKE_FLAGS[@]}"

      - name: Verify and Package Build Artifacts
        run: |
          TARGET_IMAGE=kernel-source/out/arch/arm64/boot/Image.gz-dtb
          if [ -f "$TARGET_IMAGE" ]; then
              echo "Build successful. Preparing artifact payload..."
              mkdir output
              cp $TARGET_IMAGE output/
          else
              echo "Error: Target binary Image.gz-dtb was not generated."
              exit 1
          fi

      - name: Upload Finished Kernel Payload
        uses: actions/upload-artifact@v4
        with:
          name: Miatoll-Q-Kernel-Scratch
          path: output/Image.gz-dtb
          
